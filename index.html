<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tour The Lakes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="images/TTLFAVIcon.png">

    <style>
        html, body {
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: #2b2b2b;
            overflow-x: hidden;
        }

*, *::before, *::after { box-sizing: border-box; }

.site-header {
  width: 100%;
}

.header-inner {
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.brand {
  color: rgba(255,255,255,0.92);
  font: 600 16px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  letter-spacing: 0.2px;
}

img {
  width: 100%;
  display: block;
}

.hero-wrapper {
  position: relative;
  border-top: 2px solid #b86b2a;
  border-bottom: 2px solid #b86b2a;
}

.hero-wrapper::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  pointer-events: none;
  z-index: 1;
}

.hero-wrapper h1 {
  font-weight: 600;
  position: absolute;
  left: 0;
  width: 100%;
  text-align: center;
  margin: 0;
  color: #b86b2a;
  z-index: 2;
}

.hero-wrapper p {
  position: absolute;
  left: 0;
  width: 100%;
  text-align: center;
  margin: 0;
  color: rgba(255,255,255,0.92);
  z-index: 2;
}

.hero-wrapper h1 { top: 35%; }
.hero-wrapper p  { top: 52%; }
.hero-wrapper h1 { font-size: 58px; }
.hero-wrapper p  { font-size: 28px; }

.hero-gap {
    height: 64px;
    width: 100%;
}

.tour-image img {
    max-height: 200px;
    object-fit: cover;
    position: relative;
    z-index: 0;
}

.tour-image::after {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  pointer-events: none;
  z-index: 1;
  border-top: 2px solid #b86b2a;
  border-bottom: 2px solid #b86b2a;
}

.tour-image {
  position: relative;
}

.tour-image .tour-title {
  position: absolute;
  left: 0;
  width: 100%;
  top: 18%;
  text-align: center;
  margin: 0;
  color: #b86b2a;
  z-index: 2;
  font: 600 58px/1.1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.tour-divider {
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 40px 0 20px 0;
}

.tour-divider-line {
  flex: 1;
  height: 1px;
  background: #b86b2a;
}

.tour-read,
.tour-more {
  font-size: 14px;
  font-weight: 400;
  color: rgba(255,255,255,0.6);
  margin: 0 8px;
  letter-spacing: 0.5px;
}

.tour-toggle {
  background: #2b2b2b;
  border: 1px solid #b86b2a;
  border-radius: 50%;
  padding: 8px;
  margin: 0 12px;
  cursor: pointer;
}

.tour-toggle img {
  display: block;
  width: 20px;
  height: 20px;
  border-bottom: none;
}

.tour-details {
  max-width: 900px;
  margin: 0 auto;
  padding: 20px 20px 40px 20px;

  font-weight: 600;
  color: rgba(255,255,255,0.92);
}

.tour-description {
    white-space: pre-wrap;
}

.tsec {
  margin-bottom: 24px;
}

.tsec-h {
  color: #b86b2a;
  font-weight: 600;
  font-size: 20px;
  margin-bottom: 8px;
}

.tsec-b {
  color: rgba(255,255,255,0.92);
  line-height: 1.5;
}

.tit-item {
  margin-bottom: 18px;
}

.tit-title {
  color: #b86b2a;
  font-weight: 600;
  margin-bottom: 6px;
}

.tit-body {
  color: rgba(255,255,255,0.92);
  line-height: 1.5;
}
        
.tour-row {
  position: absolute;
  left: 0;
  width: 100%;
  z-index: 2;
  padding: 0 16px; 
  top: 52%;
  box-sizing: border-box;
}

.tour-meta {
  display: block;      
  max-width: 900px;
  margin: 0 auto;
  text-align: center;
  color: rgba(255,255,255,0.92);
  font: 500 20px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  letter-spacing: 0.2px;
}

.tour-image { 
  overflow: hidden; 
}

/* ===== Public calendar (match admin look) ===== */

.tour-booking-area{
  max-width: 900px;
  margin: 0 auto 40px auto;
  padding: 0 20px;
}

.tour-calendar{
  margin-top: 18px;
  border: 1px solid #b86b2a;
  padding: 14px;
  background: #2b2b2b;
}

.cal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom: 14px;
}

.cal-nav{
  border: 1px solid #b86b2a;
  background: #2b2b2b;
  color: #b86b2a;
  padding: 8px 12px;
  cursor: pointer;
  font: 400 14px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.cal-month{
  color: rgba(255,255,255,0.92);
  font: 600 16px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  letter-spacing: 0.2px;
}

.cal-weekdays{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  margin-bottom: 6px;
}

.cal-weekdays div{
  text-align:center;
  font-weight:600;
  padding: 8px 0;
  color: rgba(255,255,255,0.92);
}

.cal-grid{
  display:grid;
  grid-template-columns: repeat(7, 1fr);
  grid-template-rows: repeat(6, 1fr);
  gap: 0;
}

.cal-cell{
  border: 1px solid #444;
  min-height: 52px;
  display:flex;
  align-items:flex-start;
  justify-content:flex-end;
  padding: 6px;
  color: rgba(255,255,255,0.8);
  cursor:pointer;
  user-select:none;
}

.cal-cell.is-empty{
  opacity: 0.25;
  cursor: default;
}

.cal-cell.has-data{
  background: rgba(184,107,42,0.15);
}

.cal-cell:not(.is-empty):hover{
  background: rgba(255,255,255,0.05);
}

.cal-cell.selected{
  border: 2px solid #b86b2a;
}

/* ===== Slots list (selectable, same visual language) ===== */

.slots-msg{
  margin: 14px 0 10px 0;
  color: rgba(255,255,255,0.6);
  font: 400 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.slots-list{
  display:flex;
  flex-direction:column;
  gap: 10px;
}

.slot-btn{
  width: 100%;
  text-align:left;
  border: 1px solid #b86b2a;
  background: #2b2b2b;
  color: rgba(255,255,255,0.92);
  padding: 12px;
  cursor: pointer;
  font: 500 15px/1.25 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.slot-btn.has-data{
  background: rgba(184,107,42,0.15); /* SAME as calendar has-data */
}

.slot-btn.selected{
  border: 2px solid #b86b2a;        /* SAME as calendar selected */
}

.slot-btn:disabled{
  opacity: 0.35;
  cursor: not-allowed;
}

.tour-price,
.tour-seats {
  display: none !important;
}

.tour-nextdate {
  display: block;
  white-space: normal;
}

.tour-meta span {
  white-space: normal;
  overflow-wrap: anywhere;
}

.booking-wrap{
  margin-top: 14px;
  border: 1px solid #b86b2a;
  background: #2b2b2b;
  padding: 14px;
}

.booking-title{
  color: rgba(255,255,255,0.92);
  font: 600 16px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  margin-bottom: 10px;
}

.booking-summary{
  color: rgba(255,255,255,0.6);
  font: 400 14px/1.3 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  margin-bottom: 12px;
  white-space: normal;
}

.booking-field{
  width: 100%;
  border: 1px solid #b86b2a;
  background: #2b2b2b;
  color: rgba(255,255,255,0.92);
  padding: 12px;
  margin-bottom: 10px;
  font: 400 16px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  box-sizing: border-box;
}

.booking-btn{
  width: 100%;
  border: 1px solid #b86b2a;
  background: #2b2b2b;
  color: #b86b2a;
  padding: 12px;
  cursor: pointer;
  font: 400 16px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.booking-btn:disabled{
  opacity: 0.35;
  cursor: not-allowed;
}

.booking-msg{
  margin-top: 10px;
  color: rgba(255,255,255,0.6);
  font: 400 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

.site-footer {
  width: 100%;
  border-top: 2px solid #b86b2a;
}

.footer-inner {
  height: 64px;
  display: flex;
  align-items: center;
  padding: 0 16px;
}

.footer-text {
  color: rgba(255,255,255,0.6);
  font: 400 14px/1 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  letter-spacing: 0.2px;
}

@media screen and (min-width: 1024px) {
  .hero-wrapper img {
    max-height: 600px;
    object-fit: cover;
  }

.hero-wrapper h1 { top: 35%; }
.hero-wrapper p { top: 48%; }

.tour-image img {
    max-height: 300px;
    object-fit: cover;
  }

  .tour-row { 
      top: 46%; 
  }

}

@media screen and (max-width: 600px) {

  .hero-wrapper h1 {
    top: 32%;
    font-size: 36px;
  }

  .hero-wrapper p {
    top: 50%;
    font-size: 18px;
  }

  .tour-image .tour-title {
      font-size: 36px;
  }

  .tour-row { 
      top: 40%; 
  }

  .tour-meta {
    font-size: 13px;
    line-height: 1.25;
  }

}
        
    </style>
</head>
 <body>

    <header class="site-header">
  <div class="header-inner">
    <div class="brand">Tour The Lakes</div>
  </div>
</header>

<div class="hero-wrapper">
  <img src="images/DSC_0092.JPG.jpg" alt="Tour The Lakes Image" class="hero-image">

  <h1>Discover the Lakes</h1>
   <p>Sightseeing with a difference</p>
    
</div>

     <div class="hero-gap"></div>

<section id="tours"></section>

<template id="tourTemplate">
  <article class="tour" data-tour-id="">
   <div class="tour-image">
    <div class="tour-title"></div>


      <div class="tour-row">
       <div class="tour-meta">
        <span class="tour-price"></span>
         <span class="tour-nextdate"></span>
          <span class="tour-seats"></span>
          </div>
           </div>
            </div>

    <div class="tour-divider">
      <div class="tour-divider-line"></div>

      <span class="tour-read">Read</span>
        
      <button class="tour-toggle" type="button" aria-expanded="false">
        <img src="images/TTLFAVIcon.png" alt="Expand tour">
      </button>

    <span class="tour-read">More</span>
        
      <div class="tour-divider-line"></div>
    </div>

<div class="tour-details" hidden>
  <div class="tour-description"></div>

  <div class="tour-booking-area">
    <!-- Calendar (public) -->
    <div class="tour-calendar">
      <div class="cal-header">
        <button type="button" class="cal-nav cal-prev">◀</button>
        <div class="cal-month"></div>
        <button type="button" class="cal-nav cal-next">▶</button>
      </div>

      <div class="cal-weekdays">
        <div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div><div>Sun</div>
      </div>

      <div class="cal-grid"></div>
    </div>

<div class="tour-workspace">
  <div class="slots-msg">Select a date.</div>
  <div class="slots-list"></div>

  <!-- Booking panel (shows after a slot is selected) -->
  <div class="booking-wrap" hidden>
    <div class="booking-title">Your booking</div>
    <div class="booking-summary"></div>

    <input class="booking-field booking-name" type="text" placeholder="Full name">
    <input class="booking-field booking-email" type="email" placeholder="Email">
    <input class="booking-field booking-phone" type="tel" placeholder="Phone">
    <input class="booking-field booking-qty" type="number" min="1" value="1" placeholder="Passengers">

    <button type="button" class="booking-btn">REQUEST BOOKING</button>
    <div class="booking-msg"></div>
  </div>
</div>
  </div>
</div>

      
  </article>
</template>


<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-text">© Tour The Lakes</div>
  </div>
</footer>



</body>
</html>
