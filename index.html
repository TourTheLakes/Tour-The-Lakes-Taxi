    // ---------- shared helpers ----------
    const CELL_COUNT = 42;

    function pad2(n) { return String(n).padStart(2, "0"); }
    function toKeyYYYYMMDD(y, m0, d) { return `${y}-${pad2(m0 + 1)}-${pad2(d)}`; }

    function monthLabel(y, m0) {
      return new Date(y, m0, 1).toLocaleString(undefined, { month: "long", year: "numeric" });
    }
    function firstDayIndexMonFirst(y, m0) {
      const js = new Date(y, m0, 1).getDay(); // Sun=0..Sat=6
      return (js + 6) % 7; // Mon=0..Sun=6
    }
    function daysInMonth(y, m0) { return new Date(y, m0 + 1, 0).getDate(); }

    function parseSlotDateTime(dateKey, timeStr) {
      const [y, m, d] = String(dateKey || "").split("-").map(Number);
      const [hh, mm] = String(timeStr || "").split(":").map(Number);
      if (!y || !m || !d || Number.isNaN(hh) || Number.isNaN(mm)) return null;
      return new Date(y, m - 1, d, hh, mm, 0, 0);
    }

    function formatGBP(value) {
      const n = Number(value);
      if (!Number.isFinite(n)) return "";
      return `£${n.toFixed(2)}`;
    }

    function escapeHtml(s) {
      return String(s ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function slugify(value) {
      return String(value || "tour")
        .toLowerCase()
        .trim()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "") || "tour";
    }

    function plainTextFromHtml(html) {
      const holder = document.createElement("div");
      holder.innerHTML = String(html || "");
      return (holder.textContent || "").replace(/\s+/g, " ").trim();
    }

    function firstUsefulValue(...values) {
      for (const value of values) {
        const clean = String(value ?? "").trim();
        if (clean) return clean;
      }
      return "";
    }

    function renderTourFacts(articleEl, tour) {
      const factsEl = articleEl.querySelector(".tour-facts");
      if (!factsEl) return;

      const facts = [
        ["Duration", firstUsefulValue(tour?.duration)],
        ["Tour type", firstUsefulValue(tour?.tourType, "Small-group sightseeing tour")],
        ["Departure", firstUsefulValue(tour?.departurePoint, tour?.meetingPoint, "Windermere Railway Station")],
      ].filter(([, value]) => value);

      factsEl.innerHTML = "";
      for (const [label, value] of facts) {
        const row = document.createElement("div");
        row.className = "tour-fact";

        const labelEl = document.createElement("span");
        labelEl.className = "tour-fact-label";
        labelEl.textContent = `${label}: `;

        const valueEl = document.createElement("span");
        valueEl.textContent = value;

        row.append(labelEl, valueEl);
        factsEl.appendChild(row);
      }

      factsEl.hidden = facts.length === 0;
    }

    function appendTourExtraSection(container, heading, value) {
      const clean = String(value ?? "").trim();
      if (!clean) return;

      const section = document.createElement("section");
      section.className = "tsec";

      const title = document.createElement("h3");

      const body = document.createElement("div");
      body.className = "tsec-b";
      body.textContent = clean;

      section.append(title, body);
      container.appendChild(section);
    }

    function renderTourExtraSections(articleEl, tour) {
      const container = articleEl.querySelector(".tour-extra-sections");
      if (!container) return;
      container.innerHTML = "";

      appendTourExtraSection(container, "At a Glance", tour?.shortSummary);
      appendTourExtraSection(container, "What Is Included", tour?.included);
      appendTourExtraSection(container, "What Is Not Included", tour?.notIncluded);
      appendTourExtraSection(container, "Accessibility", tour?.accessibility);
      appendTourExtraSection(container, "Additional Information", tour?.additionalInformation);
    }

    function removeGeneratedTourSchema() {
      document.getElementById("ttl-tour-schema")?.remove();
    }

    function buildTourSchema(toursObj) {
      const items = [];

      for (const [tourId, tour] of Object.entries(toursObj || {})) {
        if (!tour || tour.isLive !== true) continue;

        const title = firstUsefulValue(tour.title, tourId);
        const description = firstUsefulValue(
          tour.shortSummary,
          plainTextFromHtml(tour.description)
        );
        const next = findNextUpcomingSlot(tour.dates);
        const url = `https://tourthelakes.com/#tour-${slugify(tourId)}`;

        const item = {
          "@type": "TouristTrip",
          "@id": `${url}-schema`,
          "name": title,
          "url": url,
          "provider": { "@id": "https://tourthelakes.com/#tour-operator" },
          "touristType": firstUsefulValue(tour.tourType, "Sightseeing visitors"),
        };

        if (description) item.description = description;
        if (tour.imageUrl) item.image = tour.imageUrl;

        if (next && Number.isFinite(Number(next.price))) {
          item.offers = {
            "@type": "Offer",
            "url": url,
            "priceCurrency": "GBP",
            "price": Number(next.price).toFixed(2),
            "availability": Number(next.capacity) > 0
              ? "https://schema.org/InStock"
              : "https://schema.org/SoldOut",
            "validFrom": next.dt.toISOString(),
          };
        }

        items.push(item);
      }

      if (!items.length) return;

      const script = document.createElement("script");
      script.type = "application/ld+json";
      script.id = "ttl-tour-schema";
      script.textContent = JSON.stringify({
        "@context": "https://schema.org",
        "@graph": items,
      });
      document.head.appendChild(script);
    }

    function findNextUpcomingSlot(datesObj) {
      if (!datesObj || typeof datesObj !== "object") return null;

      const now = new Date();
      let best = null;

      for (const [dateKey, dateNode] of Object.entries(datesObj)) {
        const timesObj = dateNode?.times;
        if (!timesObj || typeof timesObj !== "object") continue;

        for (const [timeStr, slot] of Object.entries(timesObj)) {
          const dt = parseSlotDateTime(dateKey, timeStr);
          if (!dt) continue;
          if (dt.getTime() < now.getTime()) continue;

          if (!best || dt.getTime() < best.dt.getTime()) {
            best = {
              dateKey,
              timeStr,
              dt,
              capacity: slot?.capacity ?? null,
              price: slot?.price ?? null,
            };
          }
        }
      }
      return best;
    }

    // ---------- cleanup / state ----------
    const tourDatesUnsubs = new Map(); // tourId -> unsub
    const tourCalStates = new Map();   // tourId -> state

    function detach(fn) {
      if (typeof fn === "function") {
        try { fn(); } catch {}
      }
      return null;
    }

    function cleanupTourDatesListeners() {
      for (const unsub of tourDatesUnsubs.values()) detach(unsub);
      tourDatesUnsubs.clear();
    }

    function detachTourCalendarListeners(state) {
      state.unsubDates = detach(state.unsubDates);
      state.unsubTimes = detach(state.unsubTimes);
    }

    function clearTours() {
      cleanupTourDatesListeners();
      for (const state of tourCalStates.values()) detachTourCalendarListeners(state);
      tourCalStates.clear();
      toursEl.innerHTML = "";
      removeGeneratedTourSchema();
    }

    // ---------- booking UI helpers ----------
    function bookingEls(state) {
      const root = state.articleEl.querySelector(".tour-details");
      return {
        wrap: root?.querySelector(".booking-wrap"),
        summary: root?.querySelector(".booking-summary"),
        name: root?.querySelector(".booking-name"),
        email: root?.querySelector(".booking-email"),
        phone: root?.querySelector(".booking-phone"),
        qty: root?.querySelector(".booking-qty"),
        btn: root?.querySelector(".booking-btn"),
        msg: root?.querySelector(".booking-msg"),
      };
    }

    function setBookingMsg(state, text) {
      const els = bookingEls(state);
      if (els.msg) els.msg.textContent = String(text || "");
    }

    function hideBooking(state) {
      const els = bookingEls(state);
      if (!els.wrap) return;
      els.wrap.hidden = true;
      setBookingMsg(state, "");
    }

    function showBooking(state) {
      const els = bookingEls(state);
      if (!els.wrap) return;

      const slot = state.selectedSlot;
      if (!state.selectedDateKey || !slot || !slot.time) {
        hideBooking(state);
        return;
      }

      els.wrap.hidden = false;
      setBookingMsg(state, "");

      const cap = Number(slot.capacity);
      const price = Number(slot.price);

      const capText = Number.isFinite(cap) ? `${cap} places remaining` : "places unknown";
      const priceText = Number.isFinite(price) ? `£${price.toFixed(2)}` : "";

      if (els.summary) {
        const details = [];
        if (state.tourData?.duration) details.push(state.tourData.duration);
        details.push(firstUsefulValue(
          state.tourData?.departurePoint,
          state.tourData?.meetingPoint,
          "Windermere Railway Station"
        ));

        const detailText = details.filter(Boolean).join(" — ");
        els.summary.textContent =
          `${state.selectedDateKey} at ${slot.time} — ${capText}` +
          (priceText ? ` — ${priceText} per passenger` : "") +
          (detailText ? ` — ${detailText}` : "");
      }

      if (els.qty) {
  els.qty.value = "";
  els.qty.placeholder = "Passengers";
  els.qty.min = "1";
  if (Number.isFinite(cap) && cap >= 1) els.qty.max = String(cap);
  else els.qty.removeAttribute("max");
}
    }

    // ---------- booking submit ----------
    async function submitBooking(state) {
      const els = bookingEls(state);
      if (!els.wrap) return;

      if (els.btn?.disabled) return; // guard against double-click

      if (!state.selectedDateKey || !state.selectedSlot || !state.selectedSlot.time) {
        setBookingMsg(state, "Select a date and time slot first.");
        return;
      }

      const name = (els.name?.value || "").trim();
      const email = (els.email?.value || "").trim();
      const phone = (els.phone?.value || "").trim();
      const qty = parseInt(els.qty?.value || "", 10);

      if (!name) { setBookingMsg(state, "Enter your full name."); return; }
      if (!email) { setBookingMsg(state, "Enter your email."); return; }
      if (!qty || qty < 1) { setBookingMsg(state, "Enter a valid passenger quantity."); return; }

      const tourId = state.tourId;
      const dateKey = state.selectedDateKey;
      const time = state.selectedSlot.time;

      const capRef = ref(db, `tours/${tourId}/dates/${dateKey}/times/${time}/capacity`);

      try {
        if (els.btn) els.btn.disabled = true;
        setBookingMsg(state, "Submitting...");

        // 1) reduce capacity (transaction)
        const tx = await runTransaction(capRef, (current) => {
          const cur = Number(current);
          if (!Number.isFinite(cur)) return current; // missing/invalid capacity => no-op
          if (cur < qty) return;                     // abort
          return cur - qty;
        });

        if (!tx.committed) {
          setBookingMsg(state, "Not enough places remaining for that time slot.");
          return;
        }

        // 2) write booking record
        const bookingRef = push(ref(db, `bookings/${tourId}`));

        const tourTitle =
          state.articleEl.querySelector(".tour-title")?.textContent?.trim() || state.tourId;

        const slotPrice = Number(state.selectedSlot.price) || 0;

        await set(bookingRef, {
          tourId,
          tourTitle,
          dateKey,
          time,
          qty,
          name,
          email,
          phone,
          price: slotPrice,
          duration: firstUsefulValue(state.tourData?.duration),
          departurePoint: firstUsefulValue(
            state.tourData?.departurePoint,
            state.tourData?.meetingPoint,
            "Windermere Railway Station"
          ),
          tourType: firstUsefulValue(state.tourData?.tourType, "Small-group sightseeing tour"),
          shortSummary: firstUsefulValue(state.tourData?.shortSummary),

          // keep your existing field
          createdAt: serverTimestamp(),

          // extra (safe) fields to help admin ordering/audit (does not change front-end behaviour)
          createdAtMs: Date.now(),
          bookingStatus: "active",
          paymentStatus: "outstanding",

          status: "new",
        });

        const bookingKey = bookingRef.key || "";
        const bookingRefShort = bookingKey.slice(-7);

        openBookingSuccessModal({
          ref: bookingRefShort,
          qty,
          tour: tourTitle,
          date: dateKey,
          time,
          price: formatGBP(slotPrice),
          name,
          email,
          phone,
          duration: firstUsefulValue(state.tourData?.duration),
          departurePoint: firstUsefulValue(
            state.tourData?.departurePoint,
            state.tourData?.meetingPoint,
            "Windermere Railway Station"
          ),
        });

        // keep the UI stable after success
        setBookingMsg(state, "");
      } catch (err) {
        // if booking write fails after capacity change, add it back
        try {
          await runTransaction(capRef, (current) => {
            const cur = Number(current);
            if (!Number.isFinite(cur)) return current;
            return cur + qty;
          });
        } catch {}

        setBookingMsg(state, `Error: ${err?.message || err}`);
      } finally {
        if (els.btn) els.btn.disabled = false;
      }
    }

    // ---------- calendar + slots ----------
    function ensureCalendarGrid(gridEl) {
      if (gridEl.children.length === CELL_COUNT) return;

      gridEl.innerHTML = "";
      for (let i = 0; i < CELL_COUNT; i++) {
        const cell = document.createElement("div");
        cell.className = "cal-cell is-empty";
        cell.setAttribute("role", "gridcell");
        cell.setAttribute("aria-selected", "false");
        cell.dataset.key = "";
        cell.textContent = "";
        gridEl.appendChild(cell);
      }
    }

    function renderCalendarUI(state) {
      ensureCalendarGrid(state.gridEl);

      state.monthEl.textContent = monthLabel(state.viewYear, state.viewMonth);

      const startIdx = firstDayIndexMonFirst(state.viewYear, state.viewMonth);
      const dim = daysInMonth(state.viewYear, state.viewMonth);

      for (let i = 0; i < CELL_COUNT; i++) {
        const cell = state.gridEl.children[i];
        cell.className = "cal-cell is-empty";
        cell.dataset.key = "";
        cell.textContent = "";
        cell.setAttribute("aria-selected", "false");
        cell.removeAttribute("aria-label");

        const dayNum = i - startIdx + 1;
        if (dayNum < 1 || dayNum > dim) continue;

        const key = toKeyYYYYMMDD(state.viewYear, state.viewMonth, dayNum);
        cell.dataset.key = key;
        cell.textContent = String(dayNum);
        cell.classList.remove("is-empty");
        cell.setAttribute("aria-label", key);

        if (state.savedDates.has(key)) cell.classList.add("has-data");
        if (state.selectedDateKey === key) {
          cell.classList.add("selected");
          cell.setAttribute("aria-selected", "true");
        }
      }
    }

    function clearSlots(state, msg) {
      state.slotsListEl.innerHTML = "";
      state.slotsMsgEl.textContent = msg || "Select a date.";
      state.selectedTime = "";
      state.selectedSlot = null;
      hideBooking(state);
    }

    function renderSlots(state, timesObj) {
      state.slotsListEl.innerHTML = "";

      if (!timesObj || typeof timesObj !== "object") {
        clearSlots(state, "No times available for this date.");
        return;
      }

      const times = Object.keys(timesObj).sort();
      if (!times.length) {
        clearSlots(state, "No times available for this date.");
        return;
      }

      state.slotsMsgEl.textContent = `Available times for ${state.selectedDateKey}:`;

      for (const time of times) {
        const slot = timesObj[time] || {};
        const cap = Number(slot.capacity);
        const price = Number(slot.price);

        const capText = Number.isFinite(cap) ? `${cap}` : "";
        const priceText = Number.isFinite(price) ? `£${price.toFixed(2)}` : "";

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "slot-btn has-data";
        btn.dataset.time = time;

        btn.textContent =
          `${time} — ${capText ? capText + " places remaining" : "places unknown"}` +
          `${priceText ? " — " + priceText : ""}`;

        if (Number.isFinite(cap) && cap <= 0) {
          btn.disabled = true;
          btn.setAttribute("aria-label", `${time}, sold out`);
        }
        if (state.selectedTime === time) {
          btn.classList.add("selected");
          btn.setAttribute("aria-pressed", "true");
        } else {
          btn.setAttribute("aria-pressed", "false");
        }

        btn.addEventListener("click", () => {
          if (btn.disabled) return;

          state.selectedTime = time;
          state.selectedSlot = { time, capacity: slot.capacity, price: slot.price };

          state.slotsListEl.querySelectorAll(".slot-btn.selected")
            .forEach(x => {
              x.classList.remove("selected");
              x.setAttribute("aria-pressed", "false");
            });
          btn.classList.add("selected");
          btn.setAttribute("aria-pressed", "true");

          showBooking(state);
        });

        state.slotsListEl.appendChild(btn);
      }
    }

    function attachDatesListener(state) {
      state.unsubDates = detach(state.unsubDates);
      state.savedDates = new Set();

      const datesRef = ref(db, `tours/${state.tourId}/dates`);
      state.unsubDates = onValue(datesRef, (snap) => {
        const val = snap.val();
        state.savedDates = new Set();
        if (val && typeof val === "object") {
          for (const k of Object.keys(val)) state.savedDates.add(k);
        }

        renderCalendarUI(state);

        if (state.selectedDateKey && !state.savedDates.has(state.selectedDateKey)) {
          state.selectedDateKey = "";
          clearSlots(state, "Select a date.");
          renderCalendarUI(state);
        }
      });
    }

    function attachTimesListenerForDate(state) {
      state.unsubTimes = detach(state.unsubTimes);

      if (!state.selectedDateKey) {
        clearSlots(state, "Select a date.");
        return;
      }

      state.slotsMsgEl.textContent = "Loading times...";

      const timesRef = ref(db, `tours/${state.tourId}/dates/${state.selectedDateKey}/times`);
      state.unsubTimes = onValue(timesRef, (snap) => {
        renderSlots(state, snap.val());
      });
    }

    function initTourCalendar(tourId, articleEl, tourData) {
      if (tourCalStates.has(tourId)) return;

      const detailsEl = articleEl.querySelector(".tour-details");
      const calWrap = detailsEl?.querySelector(".tour-calendar");
      if (!detailsEl || !calWrap) return;

      const monthEl = calWrap.querySelector(".cal-month");
      const gridEl = calWrap.querySelector(".cal-grid");
      const prevBtn = calWrap.querySelector(".cal-prev");
      const nextBtn = calWrap.querySelector(".cal-next");

      const slotsMsgEl = detailsEl.querySelector(".slots-msg");
      const slotsListEl = detailsEl.querySelector(".slots-list");

      const now = new Date();

      const state = {
        tourId,
        articleEl,
        tourData: tourData || {},
        monthEl,
        gridEl,
        prevBtn,
        nextBtn,
        slotsMsgEl,
        slotsListEl,

        viewYear: now.getFullYear(),
        viewMonth: now.getMonth(),

        savedDates: new Set(),
        selectedDateKey: "",
        selectedTime: "",
        selectedSlot: null,

        unsubDates: null,
        unsubTimes: null,

        bookingBound: false,
      };

      ensureCalendarGrid(gridEl);
      renderCalendarUI(state);
      clearSlots(state, "Select a date.");
      attachDatesListener(state);

      // bind booking once per tour
      if (!state.bookingBound) {
        const els = bookingEls(state);
        if (els.btn) els.btn.addEventListener("click", () => submitBooking(state));
        hideBooking(state);
        state.bookingBound = true;
      }

      prevBtn.addEventListener("click", () => {
        state.viewMonth -= 1;
        if (state.viewMonth < 0) { state.viewMonth = 11; state.viewYear -= 1; }
        renderCalendarUI(state);
      });

      nextBtn.addEventListener("click", () => {
        state.viewMonth += 1;
        if (state.viewMonth > 11) { state.viewMonth = 0; state.viewYear += 1; }
        renderCalendarUI(state);
      });

      gridEl.addEventListener("click", (e) => {
        const cell = e.target.closest(".cal-cell");
        if (!cell) return;

        const key = cell.dataset.key;
        if (!key) return;

        state.selectedDateKey = key;
        state.selectedTime = "";
        state.selectedSlot = null;
        hideBooking(state);

        gridEl.querySelectorAll(".cal-cell.selected").forEach(c => {
          c.classList.remove("selected");
          c.setAttribute("aria-selected", "false");
        });
        cell.classList.add("selected");
        cell.setAttribute("aria-selected", "true");

        if (!state.savedDates.has(key)) {
          clearSlots(state, `No availability on ${key}. Select another date.`);
          renderCalendarUI(state);
          return;
        }

        attachTimesListenerForDate(state);
      });

      tourCalStates.set(tourId, state);
    }

    // ---------- top line "next available" ----------
    function attachTourDatesListener(tourId, articleEl) {
      const priceEl = articleEl.querySelector(".tour-price");
      const nextEl = articleEl.querySelector(".tour-nextdate");
      const seatsEl = articleEl.querySelector(".tour-seats");

      if (priceEl) priceEl.textContent = "";
      if (nextEl) nextEl.textContent = "";
      if (seatsEl) seatsEl.textContent = "";

      const datesRef = ref(db, `tours/${tourId}/dates`);
      const unsub = onValue(datesRef, (snap) => {
        const datesObj = snap.val();
        const next = findNextUpcomingSlot(datesObj);

       if (!next) {
  if (priceEl) priceEl.textContent = "";
  if (nextEl) {
    nextEl.innerHTML = `Restricted availability, please get in touch to <a href="mailto:info@tourthelakes.com">info@tourthelakes.com</a> for more details.`;
  }
  if (seatsEl) seatsEl.textContent = "";
  return;
}

        const title = articleEl.querySelector(".tour-title")?.textContent?.trim() || "tour";
        const priceText = formatGBP(next.price);

        const datePart = next.dt.toLocaleDateString(undefined, {
          day: "2-digit",
          month: "short",
          year: "numeric",
        });

        const capNum = Number(next.capacity);
        const capText = Number.isFinite(capNum) ? `${capNum}` : "";

        const sentence =
          `Our next available ${title} is on ${datePart} at ${next.timeStr}` +
          (capText ? ` and we currently have ${capText} places left` : "") +
          (priceText ? ` at the price of ${priceText}.` : ".") +
          ` Read More to find out and book.`;

        if (nextEl) nextEl.textContent = sentence;
        if (priceEl) priceEl.textContent = "";
        if (seatsEl) seatsEl.textContent = "";
      });

      tourDatesUnsubs.set(tourId, unsub);
    }

    // ---------- render tours ----------
    function renderTours(toursObj) {
      clearTours();
      if (!toursObj || typeof toursObj !== "object") return;

      for (const [tourId, tour] of Object.entries(toursObj)) {
        if (!tour || tour.isLive !== true) continue;

        const node = tpl.content.cloneNode(true);

        const article = node.querySelector(".tour");
        const titleEl = node.querySelector(".tour-title");
        const descEl = node.querySelector(".tour-description");
        const imageWrap = node.querySelector(".tour-image");

        const tourSlug = slugify(tourId);
        const detailsId = `tour-details-${tourSlug}`;
        const toggleEl = node.querySelector(".tour-toggle");
        const detailsEl = node.querySelector(".tour-details");

        article.dataset.tourId = tourId;
        article.id = `tour-${tourSlug}`;
        titleEl.textContent = tour.title || tourId;

        if (toggleEl && detailsEl) {
          toggleEl.setAttribute("aria-controls", detailsId);
          detailsEl.id = detailsId;
        }

        const bookingFields = [
          [".booking-name", ".booking-name-label", "name"],
          [".booking-email", ".booking-email-label", "email"],
          [".booking-phone", ".booking-phone-label", "phone"],
          [".booking-qty", ".booking-qty-label", "passengers"],
        ];
        for (const [inputSelector, labelSelector, fieldName] of bookingFields) {
          const input = node.querySelector(inputSelector);
          const label = node.querySelector(labelSelector);
          if (!input || !label) continue;
          const fieldId = `${fieldName}-${tourSlug}`;
          input.id = fieldId;
          label.htmlFor = fieldId;
        }

        // Description: stored as HTML created in admin
        descEl.innerHTML = tour.description || "";
        if (!tour.description) descEl.style.display = "none";

        renderTourFacts(article, tour);
        renderTourExtraSections(article, tour);

        if (tour.imageUrl) {
          const img = document.createElement("img");
          img.src = tour.imageUrl;
          img.loading = "lazy";
          img.decoding = "async";
          img.alt = firstUsefulValue(
            tour.imageAlt,
            tour.title
              ? `${tour.title} with Tour The Lakes in the Lake District`
              : "Lake District tour with Tour The Lakes"
          );
          if (Number.isFinite(Number(tour.imageWidth))) img.width = Number(tour.imageWidth);
          if (Number.isFinite(Number(tour.imageHeight))) img.height = Number(tour.imageHeight);
          imageWrap.appendChild(img);
        }

        toursEl.appendChild(node);

        // IMPORTANT: article reference remains valid after fragment is appended
        attachTourDatesListener(tourId, article);
        initTourCalendar(tourId, article, tour);
      }

      buildTourSchema(toursObj);
      showPublicToursFolder();
    }

    // Listen to /tours
    onValue(ref(db, "tours"), (snapshot) => {
      renderTours(snapshot.val());
    });

    // Toggle open/close (event delegation)
    document.addEventListener("click", (e) => {
      const toggle = e.target.closest(".tour-toggle");
      if (!toggle) return;

      const tour = toggle.closest(".tour");
      if (!tour) return;

      const details = tour.querySelector(".tour-details");
      if (!details) return;

      const stateText = tour.querySelector(".tour-read-state");
      const isOpen = toggle.getAttribute("aria-expanded") === "true";
      const willOpen = !isOpen;

      toggle.setAttribute("aria-expanded", String(willOpen));
      toggle.setAttribute("aria-label", willOpen ? "Read less" : "Read more");

      details.hidden = !willOpen;
      details.setAttribute("aria-hidden", String(!willOpen));
      tour.classList.toggle("is-open", willOpen);

      if (stateText) {
        stateText.textContent = willOpen ? "Less" : "More";
      }
    });

    void db;
  </script>
</body>
</html>
